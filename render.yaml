services:
- type: web
  name: chalchitra-backend
  runtime: node
  plan: starter
  buildCommand: npm install
  startCommand: npm start
  envVars:
  - key: NODE_ENV
    value: production
  - key: PORT
    value: 10000
  - key: DATABASE_URL
    fromDatabase:
      name: chalchitra-db
      property: connectionString
  - key: SESSION_SECRET
    generateValue: true
  - key: GOOGLE_CLIENT_ID
    value: 700742264274-t1gu6b7cj3li6fb8v0asjimmhrv34mrp.apps.googleusercontent.com
  - key: GOOGLE_CLIENT_SECRET
    value: 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
  - key: GOOGLE_CALLBACK_URL
    value: https://chalchitra-backend.onrender.com/api/auth/google/callback
  - key: FRONTEND_URL
    value: https://chalchitraseries.netlify.app

databases:
- name: chalchitra-db
  databaseName: chalchitra_db_5nu3
  user: chalchitra_db_5nu3_user
  plan: free
