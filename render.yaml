# Render Blueprint - Deploy backend
services:
  - type: web
    name: chalchitra-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: SENDER_NAME
        value: Chalchitra IIT Jammu
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_PATH
        value: /var/data/database.db
    disk:
      name: chalchitra-data
      mountPath: /var/data
      sizeGB: 1
